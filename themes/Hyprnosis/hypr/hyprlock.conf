$font = JetBrainsMono Nerd Font
$blue = rgb(01A2FC)
$blue_alpha = rgba(1868c1b3)
$blue_dim_alpha = rgba(1868c11a)
$gray_blue = rgba(7faeccb3)
$white = rgb(fafafa)

# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND
background {
    path = $HOME/.config/hyprnosis/wallpapers/Hyprnosis/hyprnosis.png
    blur_passes = 1
    color = rgba(0, 0, 2, 0.7)
}

# TIME
label {
    text = $TIME12
    color = rgba(127, 174, 204, 0.9)
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $gray_blue
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $gray_blue 
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $gray_blue 
    inner_color = $blue_dim_alpha
    font_color = $gray_blue
    fade_on_empty = false
    hide_input = false
    check_color = $blue_alpha
    fail_color = $white
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $white
    position = 0, -47
    halign = center
    valign = center
}
