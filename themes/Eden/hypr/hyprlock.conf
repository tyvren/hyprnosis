$font = JetBrainsMono Nerd Font
$moon = rgb(feffff)
$ocean = rgb(12161f)
$surface = rgb(D1CDC2)
$black = rgb(0D0D0D)

# GENERAL
general {
    monitor =
    hide_cursor = true 
    bezier = linear, 1, 1, 0, 0
    animation = fade, 1, 3, linear
}

# BACKGROUND
background {
    path = /home/tyvren/.config/hyprnosis/wallpapers/Eden/10_rain.png
    blur_passes = 1
}

# TIME
label {
    text = $TIME12
    color = $moon
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $moon
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $moon
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $moon
    inner_color = $surface
    font_color = $black
    fade_on_empty = false
    hide_input = false
    check_color = $ocean
    fail_color = $moon
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $moon
    position = 0, -47
    halign = center
    valign = center
}
