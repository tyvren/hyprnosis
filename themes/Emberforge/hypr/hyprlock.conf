$font = JetBrainsMono Nerd Font
$neon_orange = rgb(fe4f00)
$gunmetal = rgb(626262)
$white = rgb(ffffff)
$gray_light = rgb(b4b4b4)

# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND
background {
    path = $HOME/.config/hyprnosis/wallpapers/Emberforge/emberforge.jpg
    blur_passes = 1
}

# TIME
label {
    text = $TIME12
    color = $neon_orange
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $gray_light
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $neon_orange
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $neon_orange
    inner_color = $gunmetal
    font_color = $white
    fade_on_empty = false
    hide_input = false
    check_color = $neon_orange
    fail_color = $neon_orange
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $neon_orange
    position = 0, -47
    halign = center
    valign = center
}
