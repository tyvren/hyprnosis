$font = JetBrainsMono Nerd Font
$crimson = rgb(ac2f52)
$ash = rgb(a7a8ac)
$granite = rgb(49494d)

# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND
background {
    path = $HOME/.config/hyprnosis/wallpapers/Arcadia/arcadia.png
    blur_passes = 1
}

# TIME
label {
    text = $TIME12
    color = $ash
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $ash
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $granite
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $crimson
    inner_color = $ash
    font_color = $crimson
    fade_on_empty = false
    hide_input = false
    check_color = $crimson
    fail_color = $granite
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $crimson
    position = 0, -47
    halign = center
    valign = center
}
