$font = JetBrainsMono Nerd Font
$background = rgb(282A36)
$foreground = rgb(F8F8F2)
$purple = rgb(BD93F9)
$cyan = rgb(8BE9FD)
$yellow = rgb(F1FA8C)
$gray_blue = rgba(7faeccb3)

$base = $background
$text = $foreground
$accent = $purple

# GENERAL
general {
    hide_cursor = true
}

# BACKGROUND
background {
    path = $HOME/.config/hyprlock/wallpapers/Dracula/dracula.png
    blur_passes = 1
    color = $base
}

# TIME
label {
    text = $TIME12
    color = $text
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $text
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $gray_blue 
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $background
    font_color = $text
    fade_on_empty = false
    hide_input = false
    check_color = $accent
    fail_color = $cyan
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow
    position = 0, -47
    halign = center
    valign = center
}
