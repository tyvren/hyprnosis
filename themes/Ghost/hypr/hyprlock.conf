$font = JetBrainsMono Nerd Font
$hilight = rgb(ffffff)
$accent = rgba(ffffff80)
$transb = rgba(00000080)

# GENERAL
general {
    monitor =
    hide_cursor = true 
    bezier = linear, 1, 1, 0, 0
    animation = fade, 1, 3, linear
}

# BACKGROUND
background {
    path = /home/tyvren/.config/hyprnosis/wallpapers/Ghost/hyprnosis_ghost.png
    blur_passes = 1
}

# TIME
label {
    text = $TIME12
    color = $hilight
    font_size = 80
    font_family = $font
    position = 0, 600
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:43200000] date +"%A %B %d"
    color = $hilight
    font_size = 50
    font_family = $font
    position = 0, 500
    halign = center
    valign = center
}

# USER AVATAR
image {
    path = $HOME/.face
    size = 200
    border_color = $hilight
    position = 0, 140
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $hilight
    inner_color = $transb
    font_color = $hilight
    fade_on_empty = false
    hide_input = false
    check_color = $accent
    fail_color = $hilight
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $hilight
    position = 0, -47
    halign = center
    valign = center
}
